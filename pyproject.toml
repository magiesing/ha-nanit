# Root pyproject.toml — shared tooling config for the ha-nanit monorepo.
# The aionanit library has its own pyproject.toml in packages/aionanit/.

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = [
    "B",      # flake8-bugbear
    "BLE",    # flake8-blind-except
    "C4",     # flake8-comprehensions
    "D",      # pydocstyle
    "E",      # pycodestyle errors
    "F",      # pyflakes
    "I",      # isort
    "ICN",    # flake8-import-conventions
    "N",      # pep8-naming
    "PGH",    # pygrep-hooks
    "PIE",    # flake8-pie
    "RUF",    # Ruff-specific rules
    "SIM",    # flake8-simplify
    "T20",    # flake8-print
    "UP",     # pyupgrade
    "W",      # pycodestyle warnings
]
ignore = [
    "D100",   # Missing docstring in public module
    "D104",   # Missing docstring in public package
    "D203",   # 1 blank line before class docstring (conflicts with D211)
    "D213",   # Multi-line summary second line (conflicts with D212)
    "E501",   # Line too long — handled by formatter
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["D", "T20"]         # No docstring or print rules in tests
"tools/**" = ["D", "T20"]         # No docstring or print rules in dev tools
"**/proto/*_pb2.py" = ["ALL"]     # Generated protobuf files — ignore everything

[tool.ruff.lint.isort]
known-first-party = ["aionanit", "custom_components.nanit"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "aionanit.proto.*"
ignore_errors = true

[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false
disallow_untyped_decorators = false

[[tool.mypy.overrides]]
module = "custom_components.nanit.*"
disallow_subclassing_any = false
disallow_untyped_decorators = false
